version: "3.9"

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: deploy_user
      POSTGRES_PASSWORD: deploy_pass
      POSTGRES_DB: deploy_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U deploy_user -d deploy_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://deploy_user:deploy_pass@db:5432/deploy_db
      SECRET_KEY: change-me-in-production
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    command: >
      sh -c "python -m app.db.seed && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  frontend:
    build: ./frontend
    depends_on:
      - backend
    environment:
      BACKEND_URL: http://backend:8000
    ports:
      - "3000:3000"

volumes:
  postgres_data:
