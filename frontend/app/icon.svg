<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Background -->
  <rect width="32" height="32" rx="7" fill="#0f172a"/>

  <!-- Deploy arrow (green = libre / go) -->
  <path d="M16 3 L25 14 H20 V22 H12 V14 H7 Z" fill="#4ade80"/>

  <!-- Git branch Y — trunk -->
  <line x1="16" y1="22" x2="16" y2="26" stroke="#60a5fa" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Left branch -->
  <line x1="16" y1="26" x2="11" y2="30" stroke="#60a5fa" stroke-width="2" stroke-linecap="round"/>
  <!-- Right branch -->
  <line x1="16" y1="26" x2="21" y2="30" stroke="#60a5fa" stroke-width="2" stroke-linecap="round"/>
  <!-- Commit nodes -->
  <circle cx="11" cy="30" r="1.8" fill="#60a5fa"/>
  <circle cx="21" cy="30" r="1.8" fill="#60a5fa"/>
</svg>
