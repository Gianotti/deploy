version: "3.9"

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-deploy_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-deploy_pass}
      POSTGRES_DB: ${POSTGRES_DB:-deploy_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-deploy_user} -d ${POSTGRES_DB:-deploy_db}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-deploy_user}:${POSTGRES_PASSWORD:-deploy_pass}@db:5432/${POSTGRES_DB:-deploy_db}
      SECRET_KEY: ${SECRET_KEY}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      COMERCIAL_EMAIL: ${COMERCIAL_EMAIL}
      COMERCIAL_PASSWORD: ${COMERCIAL_PASSWORD}
    ports:
      - "${BACKEND_PORT:-8040}:8000"
    command: >
      sh -c "python -m app.db.seed && uvicorn app.main:app --host 0.0.0.0 --port 8000"

  frontend:
    build: ./frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      BACKEND_URL: http://backend:8000
    ports:
      - "${FRONTEND_PORT:-3040}:3000"

volumes:
  postgres_data:
